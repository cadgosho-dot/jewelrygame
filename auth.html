<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self' https://www.gstatic.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://www.gstatic.com https://*.googleusercontent.com; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com https://*.firebaseapp.com https://accounts.google.com https://*.google.com https://*.gstatic.com; frame-src 'self' https://*.firebaseapp.com https://accounts.google.com; form-action 'self' https://accounts.google.com; upgrade-insecure-requests">
  <meta name="theme-color" content="#111417">
  <title>Googleログイン</title>
  <style>
    html,body{height:100%;margin:0;background:#111417;color:#f5f7f8;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif}
    body{display:grid;place-items:center;padding:24px;box-sizing:border-box}
    main{display:grid;justify-items:center;gap:16px;width:min(420px,100%);text-align:center}
    .spinner{width:40px;height:40px;border:4px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
    h1{margin:0;font-size:1.3rem}p{margin:0;color:#cbd2d8;line-height:1.7;font-size:.9rem}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <main>
    <div class="spinner" aria-hidden="true"></div>
    <h1>Googleログインへ移動しています</h1>
    <p>Googleアカウントを選択すると、ゲームへ自動的に戻ります。</p>
  </main>
  <script type="module" src="./js/google-auth-bridge.js?v=0.10.183"></script>
</body>
</html>
