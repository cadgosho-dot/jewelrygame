name: 地金相場更新とGitHub Pages公開

on:
  push:
    branches:
      - main
  schedule:
    # GitHub ActionsのcronはUTC。日本時間の平日9:43と14:17。
    - cron: '43 0 * * 1-5'
    - cron: '17 5 * * 1-5'
  workflow_dispatch:

concurrency:
  group: jewelrygame-pages-and-metals
  cancel-in-progress: false

jobs:
  update-metals:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 1

      - name: Push前の正常な相場履歴を引き継ぐ
        if: github.event_name == 'push'
        env:
          BEFORE_SHA: ${{ github.event.before }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "比較できるPush前コミットがないため、履歴引き継ぎを省略します。"
            exit 0
          fi
          if ! curl --fail --silent --show-error --location --retry 3 \
            -H "Accept: application/vnd.github.raw+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/data/metals.json?ref=${BEFORE_SHA}" \
            --output /tmp/metals-before-push.json; then
            echo "Push前の地金相場ファイルを取得できなかったため、履歴引き継ぎを省略します。"
            exit 0
          fi
          python3 - <<'PY'
          import json
          from pathlib import Path

          current_path = Path('data/metals.json')
          previous_path = Path('/tmp/metals-before-push.json')
          try:
              current = json.loads(current_path.read_text(encoding='utf-8'))
              previous = json.loads(previous_path.read_text(encoding='utf-8'))
          except (OSError, json.JSONDecodeError):
              print('履歴引き継ぎ用JSONを読み取れなかったため省略します。')
              raise SystemExit(0)

          previous_spot = previous.get('spotPerGram') or {}
          previous_is_live = (
              previous.get('status') == 'live'
              and all(isinstance(previous_spot.get(key), (int, float)) and previous_spot[key] > 0
                      for key in ('gold', 'silver', 'platinum'))
          )
          if current.get('status') != 'live' and previous_is_live:
              current_path.write_text(
                  json.dumps(previous, ensure_ascii=False, indent=2) + '\n',
                  encoding='utf-8',
              )
              print('Push前の正常な相場・前日比・履歴を引き継ぎました。')
          else:
              print('現在の相場JSONをそのまま更新基準にします。')
          PY

      - name: APIキーを確認
        env:
          METALS_DEV_API_KEY: ${{ secrets.METALS_DEV_API_KEY }}
        run: |
          if [ -z "$METALS_DEV_API_KEY" ]; then
            echo "GitHub Secret『METALS_DEV_API_KEY』を設定してください。" >&2
            exit 1
          fi
          echo "::add-mask::$METALS_DEV_API_KEY"

      - name: Metals.Devから価格を取得して計算
        env:
          METALS_DEV_API_KEY: ${{ secrets.METALS_DEV_API_KEY }}
        run: python3 scripts/update-metals.py

      - name: 生成JSONを検証
        run: |
          python3 -m json.tool data/metals.json > /dev/null
          python3 - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path('data/metals.json').read_text(encoding='utf-8'))
          if data.get('status') != 'live':
              raise SystemExit('地金相場がlive状態ではないため公開を中止します。')
          spot = data.get('spotPerGram') or {}
          for metal in ('gold', 'silver', 'platinum'):
              value = spot.get(metal)
              if not isinstance(value, (int, float)) or value <= 0:
                  raise SystemExit(f'{metal}の地金相場が不正なため公開を中止します。')
          PY

      - name: 更新結果をコミット
        run: |
          if git diff --quiet -- data/metals.json; then
            echo "価格ファイルに変更はありません。"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/metals.json
          git commit -m "地金相場を自動更新"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"

  build-pages:
    permissions:
      contents: read
      pages: read
    if: needs.update-metals.result == 'success'
    needs:
      - update-metals
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 公開する最新版を取得
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 1

      - name: GitHub Pagesを設定
        uses: actions/configure-pages@v5

      - name: 公開用フォルダを作成
        run: |
          mkdir -p _site
          rsync -a ./ _site/ \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='_site/' \
            --exclude='scripts/' \
            --exclude='*.md' \
            --exclude='firestore.rules'

      - name: GitHub Pages用ファイルをアップロード
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy-pages:
    permissions:
      contents: read
      pages: write
      id-token: write
    if: always() && needs.build-pages.result == 'success'
    needs:
      - build-pages
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: GitHub Pagesへ公開
        id: deployment
        uses: actions/deploy-pages@v4
