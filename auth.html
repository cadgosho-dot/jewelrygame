<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self' https://www.gstatic.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://www.gstatic.com https://*.googleusercontent.com; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com https://*.firebaseapp.com https://accounts.google.com https://*.google.com https://*.gstatic.com; frame-src 'self' https://*.firebaseapp.com https://accounts.google.com; form-action 'self' https://accounts.google.com; upgrade-insecure-requests">
  <meta name="theme-color" content="#111417">
  <title>Googleログイン</title>
  <style>
    html,body{min-height:100%;margin:0;background:#111417;color:#f5f7f8;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif}
    body{display:grid;place-items:center;padding:24px;box-sizing:border-box}
    main{display:grid;justify-items:stretch;gap:16px;width:min(420px,100%);text-align:center}
    h1{margin:0;font-size:1.35rem}p{margin:0;color:#cbd2d8;line-height:1.7;font-size:.92rem}
    button,a{min-height:54px;border-radius:14px;font:inherit;font-weight:800;display:grid;place-items:center;text-decoration:none;box-sizing:border-box}
    button{border:0;background:#fff;color:#15191d;padding:0 20px}button:disabled{opacity:.55}
    a{border:1px solid rgba(255,255,255,.35);color:#fff;padding:0 20px}
    #auth-status{min-height:3em;font-size:.84rem;color:#d7dde2}
  </style>
</head>
<body>
  <main>
    <h1>Googleアカウントでログイン</h1>
    <p>ログイン方法が新しくなりました。下のボタンを押して、Googleアカウントを選択してください。</p>
    <button id="google-popup-login" type="button">Googleアカウントを選ぶ</button>
    <p id="auth-status" role="status"></p>
    <a href="./index.html">ゲームへ戻る</a>
  </main>
  <script type="module" src="./js/google-auth-bridge.js?v=0.10.231"></script>
</body>
</html>
