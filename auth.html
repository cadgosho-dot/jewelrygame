<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self' https://www.gstatic.com https://apis.google.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://www.gstatic.com https://*.googleusercontent.com; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com https://*.firebaseapp.com https://accounts.google.com https://*.google.com https://*.gstatic.com; frame-src 'self' https://*.firebaseapp.com https://accounts.google.com https://www.google.com; form-action 'self' https://accounts.google.com; upgrade-insecure-requests">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="theme-color" content="#111417">
  <title>Googleログイン</title>
  <style>
    html,body{min-height:100%;margin:0;background:#111417;color:#f5f7f8;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif}
    body{display:grid;place-items:center;padding:24px;box-sizing:border-box}
    main{display:grid;justify-items:stretch;gap:15px;width:min(460px,100%);text-align:center}
    .auth-card{display:grid;gap:15px;padding:24px;border:1px solid rgba(255,255,255,.14);border-radius:20px;background:rgba(255,255,255,.06);box-shadow:0 18px 50px rgba(0,0,0,.32)}
    .auth-kicker{font-size:.72rem;letter-spacing:.18em;color:#dfc17c;font-weight:800}
    h1{margin:0;font-size:1.4rem}p{margin:0;color:#cbd2d8;line-height:1.7;font-size:.92rem}
    button,a{min-height:54px;border-radius:14px;font:inherit;font-weight:800;display:grid;place-items:center;text-decoration:none;box-sizing:border-box}
    button{border:0;background:#fff;color:#15191d;padding:0 20px;cursor:pointer}button:disabled{opacity:.55;cursor:wait}
    button.secondary,a.secondary{background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.28);min-height:46px;padding:0 18px}
    a{border:1px solid rgba(255,255,255,.35);color:#fff;padding:0 20px}
    #auth-status{min-height:3.2em;font-size:.86rem;color:#e0e5e9}
    #auth-detail{min-height:1.4em;font-size:.72rem;color:#9eaab3;overflow-wrap:anywhere}
    #auth-environment{font-size:.72rem;color:#dfc17c}
    .auth-help{font-size:.76rem;color:#aeb7be}
    .external-panel{display:grid;gap:10px;padding:14px;border-radius:16px;background:rgba(223,193,124,.09);border:1px solid rgba(223,193,124,.28)}
    .external-panel strong{font-size:.92rem;color:#f0d69a}.external-panel p{font-size:.78rem}
    .external-actions{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    [hidden]{display:none!important}
    @media(max-width:420px){.external-actions{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main>
    <section class="auth-card">
      <span class="auth-kicker">JEWELRY × JEWELRY</span>
      <h1>Googleアカウントでログイン</h1>
      <p>ゲームの埋め込み画面を離れた専用ページで認証します。</p>
      <p id="auth-environment" aria-live="polite"></p>
      <button id="google-popup-login" type="button" disabled>Googleアカウントを選ぶ</button>
      <button id="auth-recheck" class="secondary" type="button" hidden>ログイン状態を再確認する</button>
      <p id="auth-status" role="status" aria-live="polite">認証機能を準備しています…</p>
      <p id="auth-detail" aria-live="polite"></p>
      <section id="auth-external-panel" class="external-panel" hidden>
        <strong>通常ブラウザで開く</strong>
        <p>ホーム画面アプリやLINEなどのアプリ内ブラウザでは、Google画面から認証結果が戻らない場合があります。Chrome、Safari、Edgeなどで開くと、そのブラウザ上でゲームを続けられます。</p>
        <div class="external-actions">
          <a id="auth-external-link" class="secondary" href="./auth.html?browser=1" target="_blank" rel="noopener external">通常ブラウザで開く</a>
          <button id="auth-copy-url" class="secondary" type="button">URLをコピー</button>
        </div>
        <button id="auth-retry-popup" class="secondary" type="button" hidden>この画面でもう一度試す</button>
      </section>
      <p class="auth-help">ログインが完了すると、自動的にゲームへ戻ります。</p>
    </section>
    <a href="./index.html">ログインせずゲームへ戻る</a>
  </main>
  <script type="module" src="./js/google-auth-bridge.js?v=0.10.262"></script>
</body>
</html>
