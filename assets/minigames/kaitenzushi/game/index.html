<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>回転寿司ミニゲーム</title>
<style>
  :root {
    --wood1: #b77a42;
    --wood2: #8e552d;
    --belt: #34383d;
    --belt-edge: #17191c;
    --cream: #fff6dd;
  }

  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    overflow: hidden;
    font-family: system-ui, -apple-system, "Hiragino Sans", "Yu Gothic", sans-serif;
    background: #2a1710;
  }

  body {
    display: grid;
    place-items: center;
  }

  #game {
    position: relative;
    width: min(100vw, 720px);
    height: 100dvh;
    max-height: 1000px;
    overflow: hidden;
    background:
      linear-gradient(rgba(255,255,255,.04), rgba(0,0,0,.08)),
      repeating-linear-gradient(
        90deg,
        var(--wood1) 0 70px,
        var(--wood2) 71px 74px
      );
  }

  .wall {
    position: absolute;
    inset: 0 0 58% 0;
    background:
      linear-gradient(rgba(255,255,255,.6), rgba(255,245,220,.4)),
      repeating-linear-gradient(0deg, #eadfc9 0 42px, #d8cab3 43px 45px);
    border-bottom: 12px solid #5c311e;
  }


  .hud {
    position: absolute;
    z-index: 90;
    top: auto;
    left: auto;
    right: 134px;
    bottom: 12%;
    display: flex;
    align-items: flex-end;
    gap: 10px;
    overflow: visible;
    pointer-events: none;
  }

  .hud-box {
    min-width: 112px;
    height: 56px;
    padding: 0 14px;
    border: 3px solid rgba(255,255,255,.94);
    border-radius: 15px;
    background: rgba(26,17,13,.82);
    color: white;
    display: grid;
    place-items: center;
    font-weight: 800;
    text-align: center;
    text-shadow: 0 2px 0 #000;
    box-shadow: 0 5px 15px rgba(0,0,0,.24);
  }

  .hud-box strong {
    display: block;
    font-size: 25px;
    line-height: 1;
    color: #ffffff;
    white-space: nowrap;
  }

  #beltWrap {
    position: absolute;
    z-index: 5;
    left: 0;
    right: 0;    top: 37%;
    height: 30%;
    overflow: hidden;
    border-top: 12px solid var(--belt-edge);
    border-bottom: 12px solid var(--belt-edge);
    background:
      repeating-linear-gradient(
        90deg,
        #3a3f45 0 48px,
        #555b61 49px 54px
      );
    box-shadow:
      inset 0 16px 25px rgba(255,255,255,.08),
      inset 0 -16px 25px rgba(0,0,0,.35),
      0 14px 20px rgba(0,0,0,.24);
  }

  #beltWrap::before,
  #beltWrap::after {
    content: "";
    position: absolute;
    left: 0;
    right: 0;
    height: 18px;
    z-index: 10;
    background: repeating-linear-gradient(90deg, #aeb3b8 0 30px, #747a80 31px 38px);
  }

  #beltWrap::before { top: 8px; }
  #beltWrap::after { bottom: 8px; }

  #belt {
    position: absolute;
    inset: 0;
  }

  .sushi-item {
    position: absolute;
    width: 145px;
    height: 128px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    touch-action: manipulation;
    filter: drop-shadow(0 10px 8px rgba(0,0,0,.33));
  }

  .plate {
    position: absolute;
    left: 7px;
    right: 7px;
    bottom: 8px;
    height: 52px;
    border-radius: 50%;
    background:
      radial-gradient(ellipse at center, #fff 0 45%, #e6e6e6 46% 57%, var(--plateColor) 58% 68%, var(--plateAccent, #fff) 69% 75%, var(--plateColor) 76%);
    border: 3px solid rgba(0,0,0,.16);
  }

  .food {
    position: absolute;
    left: 50%;
    bottom: 35px;
    transform: translateX(-50%);
    font-size: 72px;
    line-height: 1;
    text-shadow: 0 4px 0 rgba(255,255,255,.25);
  }


  .eat {
    pointer-events: none;
    animation: eat .28s ease-in forwards;
  }

  @keyframes eat {
    0% { transform: translateY(-50%) scale(1); opacity: 1; }
    45% { transform: translateY(-60%) scale(1.18) rotate(-4deg); opacity: 1; }
    100% { transform: translateY(-30%) scale(.18) rotate(15deg); opacity: 0; }
  }

  .miss {
    position: absolute;
    z-index: 30;
    color: #fff;
    font-weight: 1000;
    font-size: 24px;
    text-shadow: 0 3px 0 #a61c1c, 0 0 12px #000;
    pointer-events: none;
    animation: floatText .8s ease-out forwards;
  }

  .points {
    position: absolute;
    z-index: 30;
    color: #ffe95e;
    font-weight: 1000;
    font-size: 30px;
    text-shadow: 0 3px 0 #b74900, 0 0 12px #000;
    pointer-events: none;
    animation: floatText .8s ease-out forwards;
  }

  @keyframes floatText {
    from { transform: translate(-50%, 0) scale(.8); opacity: 1; }
    to { transform: translate(-50%, -75px) scale(1.15); opacity: 0; }
  }


  .counter {
    position: absolute;
    z-index: 8;
    left: 0;
    right: 0;
    bottom: 0;
    height: 21%;
    background:
      linear-gradient(rgba(255,255,255,.08), rgba(0,0,0,.2)),
      repeating-linear-gradient(
        90deg,
        #8f542f 0 90px,
        #6d3b24 91px 95px
      );
    border-top: 9px solid #492719;
  }

  .instruction {
    position: absolute;
    z-index: 15;
    left: 50%;
    bottom: 7%;
    transform: translateX(-50%);
    width: min(88%, 500px);
    padding: 13px 18px;
    border: 3px solid #fff;
    border-radius: 18px;
    background: rgba(28,16,11,.76);
    color: white;
    font-size: clamp(15px, 4.2vw, 21px);
    font-weight: 900;
    text-align: center;
    text-shadow: 0 2px #000;
  }


  #checkoutButton {
    position: absolute;
    z-index: 95;
    right: 16px;
    bottom: 12%;
    width: 108px;
    height: 56px;
    padding: 0 14px;
    border: 3px solid #fff;
    border-radius: 15px;
    background: #e63946;
    color: #fff;
    font-size: 18px;
    font-weight: 1000;
    line-height: 1;
    box-shadow: 0 6px 0 #8c1820;
    display: none;
  }

  #checkoutButton:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 #8c1820;
  }


  #plateStack {
    position: relative;
    width: 190px;
    height: calc(88dvh - 8px);
    flex: 0 0 190px;
    align-self: flex-end;
    overflow: visible;
    pointer-events: none;
    filter: drop-shadow(0 9px 8px rgba(0,0,0,.34));
  }

  .stacked-plate {
    position: absolute;
    left: 50%;
    width: 164px;
    height: 48px;
    transform: translateX(-50%);
    border-radius: 50%;
    background:
      radial-gradient(
        ellipse at 50% 38%,
        #ffffff 0 35%,
        #eeeeee 36% 47%,
        var(--stackColor) 48% 61%,
        var(--stackAccent, #ffffff) 62% 70%,
        var(--stackColor) 71% 80%,
        #d9d9d9 81% 100%
      );
    border: 3px solid rgba(0,0,0,.25);
    box-shadow:
      inset 0 7px 8px rgba(255,255,255,.75),
      inset 0 -8px 10px rgba(0,0,0,.16),
      0 5px 5px rgba(0,0,0,.24);
  }

  .stacked-plate::after {
    content: "";
    position: absolute;
    left: 13%;
    right: 13%;
    bottom: 2px;
    height: 13px;
    border-radius: 50%;
    background: rgba(0,0,0,.13);
    filter: blur(2px);
  }


  #startScreen, #resultScreen {
    position: absolute;
    z-index: 100;
    inset: 0;
    display: grid;
    place-content: center;
    gap: 18px;
    padding: 30px;
    background: rgba(25,12,8,.72);
    backdrop-filter: blur(4px);
    color: white;
    text-align: center;
  }

  #resultScreen {
    display: none;
  }

  .panel {
    padding: 26px 22px;
    border: 5px solid #fff4d4;
    border-radius: 24px;
    background: #9b251f;
    box-shadow: 0 13px 0 #5f1714, 0 22px 35px rgba(0,0,0,.36);
  }

  .panel h1 {
    margin: 0 0 8px;
    font-size: clamp(34px, 10vw, 64px);
  }

  .panel p {
    margin: 7px 0 20px;
    line-height: 1.7;
    font-weight: 800;
  }

  button {
    appearance: none;
    border: 4px solid white;
    border-radius: 18px;
    padding: 14px 28px;
    background: #ffd84e;
    color: #4c2216;
    font: inherit;
    font-size: 22px;
    font-weight: 1000;
    box-shadow: 0 7px 0 #b68100;
    cursor: pointer;
  }

  button:active {
    transform: translateY(5px);
    box-shadow: 0 2px 0 #b68100;
  }

  #finalScore {
    display: block;
    font-size: 52px;
    color: #fff36a;
    text-shadow: 0 4px #65120f;
  }


  @media (orientation: landscape) {
    #game {
      width: 100vw;
      height: 100dvh;
      max-width: none;
      max-height: none;
    }

    .wall {
      inset: 0 0 60% 0;
    }


    .hud {
      top: auto;
      left: auto;
      right: 132px;
      bottom: 7%;
    }

    .hud-box {
      min-width: 100px;
      padding: 9px 12px;
    }

    .hud-box strong {
      font-size: 22px;
    }

    #beltWrap {
      top: 34%;
      height: 34%;
    }

    .sushi-item {
      width: 132px;
      height: 112px;
    }

    .food {
      bottom: 31px;
      font-size: 62px;
    }

    .plate {

    }

    .counter {

    }


    #checkoutButton {

      padding: 10px 17px;
    }
  }

  @media (orientation: landscape) and (max-height: 430px) {

    .hud {
      top: auto;

    }

      min-width: 86px;

    }

    .hud-box strong {
      font-size: 18px;
    }

    #beltWrap {
      top: 31%;

      border-top-width: 8px;
      border-bottom-width: 8px;
    }

    .sushi-item {
      width: 116px;
      height: 98px;
    }

    .food {

      font-size: 52px;
    }

    .plate {
      height: 39px;
    }


    .counter {

    }



  }






  @media (orientation: landscape) {
    .hud {
      right: 134px;
      bottom: 6%;

    }

    #plateStack {

    }

    .stacked-plate {
      width: 205px;

    }

    .hud-box {
      min-width: 112px;
      width: auto;
      height: 52px;
      padding: 0 14px;
    }

    #checkoutButton {
      right: 16px;

      height: 52px;
      padding: 0 14px;
    }
  }

  @media (orientation: landscape) and (max-height: 430px) {

    }

    #plateStack {

      flex-basis: 205px;
    }

    .stacked-plate {

    }

    .hud-box {

      height: 46px;
      padding: 0 10px;
    }

    .hud-box strong {

    }

    #checkoutButton {

      height: 46px;
      padding: 0 10px;

      font-size: 15px;
    }
  }

  @media (orientation: landscape) {

  const integrationParams = new URLSearchParams(window.location.hash.replace(/^#/, ""));
  const integrationNumber = (name, fallback) => {
    const raw = integrationParams.get(name);
    if (raw === null || raw === "") return fallback;
    const value = Number(raw);
    return Number.isFinite(value) ? value : fallback;
  };
  const integrationFlag = (name, fallback = false) => {
    const raw = integrationParams.get(name);
    if (raw === null) return fallback;
    return raw === "1" || raw === "true";
  };
  const integrationConfig = {
    embedded: integrationFlag("embedded"),
    maxBudget: Math.max(0, Math.floor(integrationNumber("budget", Number.MAX_SAFE_INTEGER))),
    sfxVolume: Math.max(0, Math.min(1, integrationNumber("sfxVolume", 1))),
    ambientVolume: Math.max(0, Math.min(1, integrationNumber("ambientVolume", 1))),
    sfxMuted: integrationFlag("sfxMuted"),
    ambientMuted: integrationFlag("ambientMuted"),
    externalAudioPriority: integrationFlag("externalAudioPriority"),
  };

  function sendIntegrationMessage(type, detail = {}) {
    if (!integrationConfig.embedded || window.parent === window) return;
    window.parent.postMessage({
      source: "jxj-kaitenzushi",
      type,
      ...detail,
    }, "*");
  }

  function effectiveSfxVolume() {
    if (integrationConfig.externalAudioPriority || integrationConfig.sfxMuted) return 0;
    return integrationConfig.sfxVolume;
  }

  function effectiveAmbientVolume() {
    if (integrationConfig.externalAudioPriority || integrationConfig.ambientMuted) return 0;
    return integrationConfig.ambientVolume;
  }

  let bgmTimer = null;
  let bgmStep = 0;

  let bgmFeedback = null;
  let ambienceNodes = [];
  let ambienceTimers = [];
  const items = new Set();
  const SUSHI_SPEED = 135;
  const SUSHI_SPACING = 185;

  function initAudio() {
    if (!audioContext) {
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      if (AudioCtx) audioContext = new AudioCtx();
    }
    if (audioContext?.state === "suspended") audioContext.resume();
  }

  function chewSound() {
    const volume = effectiveSfxVolume();
    if (volume <= 0) return;

    // 提供された食事効果音を、タップごとに最初から再生
    const sound = new Audio(CHEW_SOUND_DATA);
    sound.preload = "auto";
    sound.volume = volume;
    sound.currentTime = 0;

    // 効果音が聞き取りやすいよう環境音を一時的に下げる
    if (audioContext && bgmMaster && effectiveAmbientVolume() > 0) {
      const now = audioContext.currentTime;
      const ambientTarget = 0.18 * effectiveAmbientVolume();
      bgmMaster.gain.cancelScheduledValues(now);
      bgmMaster.gain.setValueAtTime(Math.max(0.0001, bgmMaster.gain.value), now);
      bgmMaster.gain.linearRampToValueAtTime(Math.max(0.0001, ambientTarget * 0.14), now + 0.02);
      bgmMaster.gain.linearRampToValueAtTime(ambientTarget, now + 1.0);
    }

    sound.play().catch(() => {
      // 端末側の音声制限時は次のタップで再試行
    });
  }

  function rememberAmbienceNode(node) {
    ambienceNodes.push(node);
    return node;
  }

  function rememberAmbienceTimer(timer) {
    ambienceTimers.push(timer);
    return timer;
  }

  function makeAmbientNoiseBuffer(seconds = 5) {
    const length = Math.floor(audioContext.sampleRate * seconds);
    const buffer = audioContext.createBuffer(
      1,
      length,
      audioContext.sampleRate
    );
    const data = buffer.getChannelData(0);

    let smooth = 0;
    for (let i = 0; i < length; i++) {
      const raw = Math.random() * 2 - 1;
      smooth = smooth * 0.93 + raw * 0.07;
      data[i] = smooth;
    }

    return buffer;
  }

  function startCrowdRoomTone() {
    if (!audioContext || !bgmMaster) return;

    // 店内全体のざわめき
    const crowd = rememberAmbienceNode(audioContext.createBufferSource());
    const crowdBand = rememberAmbienceNode(audioContext.createBiquadFilter());
    const crowdLow = rememberAmbienceNode(audioContext.createBiquadFilter());
    const crowdGain = rememberAmbienceNode(audioContext.createGain());

    crowd.buffer = makeAmbientNoiseBuffer(6);
    crowd.loop = true;

    crowdBand.type = "bandpass";
    crowdBand.frequency.value = 520;
    crowdBand.Q.value = 0.65;

    crowdLow.type = "lowpass";
    crowdLow.frequency.value = 1450;

    crowdGain.gain.value = 0.23;

    crowd.connect(crowdBand);
    crowdBand.connect(crowdLow);
    crowdLow.connect(crowdGain);
    crowdGain.connect(bgmMaster);
    crowd.start();

    // 遠くの人声の厚み
    const murmur = rememberAmbienceNode(audioContext.createBufferSource());
    const murmurFilter = rememberAmbienceNode(audioContext.createBiquadFilter());
    const murmurGain = rememberAmbienceNode(audioContext.createGain());

    murmur.buffer = makeAmbientNoiseBuffer(4.5);
    murmur.loop = true;
    murmur.playbackRate.value = 0.78;

    murmurFilter.type = "bandpass";
    murmurFilter.frequency.value = 760;
    murmurFilter.Q.value = 1.1;
    murmurGain.gain.value = 0.09;

    murmur.connect(murmurFilter);
    murmurFilter.connect(murmurGain);
    murmurGain.connect(bgmMaster);
    murmur.start();
  }

  function playChatterBurst() {
    if (!running || !audioContext || !bgmMaster) return;

    const now = audioContext.currentTime;
    const voices = 2 + Math.floor(Math.random() * 3);

    for (let v = 0; v < voices; v++) {
      const startTime = now + v * 0.07 + Math.random() * 0.12;
      const syllables = 2 + Math.floor(Math.random() * 4);

      for (let i = 0; i < syllables; i++) {
        const t = startTime + i * (0.10 + Math.random() * 0.07);
        const duration = 0.08 + Math.random() * 0.08;

        const osc = rememberAmbienceNode(audioContext.createOscillator());
        const gain = rememberAmbienceNode(audioContext.createGain());
        const formant = rememberAmbienceNode(audioContext.createBiquadFilter());

        osc.type = "sawtooth";
        const base = 115 + Math.random() * 135;
        osc.frequency.setValueAtTime(base, t);
        osc.frequency.linearRampToValueAtTime(
          base * (0.88 + Math.random() * 0.28),
          t + duration
        );

        formant.type = "bandpass";
        formant.frequency.value = 480 + Math.random() * 850;
        formant.Q.value = 2.2;

        gain.gain.setValueAtTime(0.0001, t);
        gain.gain.exponentialRampToValueAtTime(
          0.008 + Math.random() * 0.014,
          t + 0.015
        );
        gain.gain.exponentialRampToValueAtTime(0.0001, t + duration);

        osc.connect(formant);
        formant.connect(gain);
        gain.connect(bgmMaster);
        osc.start(t);
        osc.stop(t + duration);
      }
    }
  }

  function playGlassClink() {
    if (!running || !audioContext || !bgmMaster) return;

    const now = audioContext.currentTime;
    const notes = [1450 + Math.random() * 900, 2050 + Math.random() * 1100];

    notes.forEach((frequency, index) => {
      const osc = rememberAmbienceNode(audioContext.createOscillator());
      const gain = rememberAmbienceNode(audioContext.createGain());

      osc.type = "sine";
      osc.frequency.setValueAtTime(frequency, now + index * 0.018);
      gain.gain.setValueAtTime(0.025, now + index * 0.018);
      gain.gain.exponentialRampToValueAtTime(
        0.0001,
        now + 0.22 + index * 0.025
      );

      osc.connect(gain);
      gain.connect(bgmMaster);
      osc.start(now + index * 0.018);
      osc.stop(now + 0.24 + index * 0.025);
    });
  }

  function playDishSound() {
    if (!running || !audioContext || !bgmMaster) return;

    const now = audioContext.currentTime;
    const duration = 0.075;
    const buffer = audioContext.createBuffer(
      1,
      Math.floor(audioContext.sampleRate * duration),
      audioContext.sampleRate
    );
    const data = buffer.getChannelData(0);

    for (let i = 0; i < data.length; i++) {
      const p = i / data.length;
      data[i] = (Math.random() * 2 - 1) * Math.exp(-p * 10);
    }

    const source = rememberAmbienceNode(audioContext.createBufferSource());
    const high = rememberAmbienceNode(audioContext.createBiquadFilter());
    const gain = rememberAmbienceNode(audioContext.createGain());

    source.buffer = buffer;
    high.type = "highpass";
    high.frequency.value = 1200;
    gain.gain.value = 0.018;

    source.connect(high);
    high.connect(gain);
    gain.connect(bgmMaster);
    source.start(now);
    source.stop(now + duration);
  }

  function playShortLaugh() {
    if (!running || !audioContext || !bgmMaster) return;

    const now = audioContext.currentTime;
    const pulses = 3 + Math.floor(Math.random() * 3);

    for (let i = 0; i < pulses; i++) {
      const t = now + i * 0.14;
      const osc = rememberAmbienceNode(audioContext.createOscillator());
      const gain = rememberAmbienceNode(audioContext.createGain());
      const filter = rememberAmbienceNode(audioContext.createBiquadFilter());

      osc.type = "triangle";
      osc.frequency.setValueAtTime(170 + Math.random() * 90, t);
      osc.frequency.linearRampToValueAtTime(
        210 + Math.random() * 110,
        t + 0.09
      );

      filter.type = "bandpass";
      filter.frequency.value = 680;
      filter.Q.value = 1.4;

      gain.gain.setValueAtTime(0.0001, t);
      gain.gain.exponentialRampToValueAtTime(0.012, t + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.11);

      osc.connect(filter);
      filter.connect(gain);
      gain.connect(bgmMaster);
      osc.start(t);
      osc.stop(t + 0.12);
    }
  }

  function scheduleAmbience() {
    if (!running || !audioContext || !bgmMaster) return;

    playChatterBurst();

    if (Math.random() < 0.55) playGlassClink();
    if (Math.random() < 0.60) playDishSound();
    if (Math.random() < 0.22) playShortLaugh();

    const delay = 650 + Math.random() * 1200;
    rememberAmbienceTimer(setTimeout(scheduleAmbience, delay));
  }

  function startBgm() {
    initAudio();
    if (!audioContext) return;

    stopBgm();

    bgmMaster = audioContext.createGain();
    bgmMaster.gain.value = 0.18 * effectiveAmbientVolume();
    bgmMaster.connect(audioContext.destination);

    startCrowdRoomTone();
    scheduleAmbience();
  }

  function stopBgm() {
    if (bgmTimer) {
      clearTimeout(bgmTimer);
      bgmTimer = null;
    }

    ambienceTimers.forEach((timer) => clearTimeout(timer));
    ambienceTimers = [];

    ambienceNodes.forEach((node) => {
      try {
        if (typeof node.stop === "function") node.stop();
      } catch (_) {}
      try {
        node.disconnect();
      } catch (_) {}
    });
    ambienceNodes = [];

    for (const node of [bgmDelay, bgmFeedback, bgmMaster]) {
      if (!node) continue;
      try {
        node.disconnect();
      } catch (_) {}
    }

    bgmDelay = null;
    bgmFeedback = null;
    bgmMaster = null;
  }

  function sayMoguMogu() {
    void chewSound();
  }




  function refreshForOrientation() {
    document.documentElement.dataset.orientation =
      window.innerWidth > window.innerHeight ? "landscape" : "portrait";

    requestAnimationFrame(() => {
      normalizeItemsAfterResize();
      updatePlateStack();
    });
  }

  function normalizeItemsAfterResize() {
    const sorted = [...items]
      .filter(item => !item.eaten)
      .sort((a, b) => a.x - b.x);

    let previousX = -Infinity;
    for (const item of sorted) {
      if (item.x - previousX < SUSHI_SPACING) {
        item.x = previousX + SUSHI_SPACING;
        item.el.style.left = item.x + "px";
      }
      previousX = item.x;
    }
  }

  function canSpawnSushi() {
    const spawnX = belt.clientWidth + 155;

    for (const item of items) {
      if (item.eaten) continue;
      if (item.x > spawnX - SUSHI_SPACING) {
        return false;
      }
    }

    return true;
  }

  function spawnSushi() {
    const data = sushiTypes[Math.floor(Math.random() * sushiTypes.length)];
    const el = document.createElement("div");
    el.className = "sushi-item";
    el.style.left = (belt.clientWidth + 155) + "px";
    el.style.setProperty("--plateColor", data.color);
    el.style.setProperty("--plateAccent", data.accent);

    if (data.image) {
      el.classList.add("image-sushi");
      el.innerHTML = `
      <img class="custom-sushi-image" src="${data.image}" alt="${data.name}" draggable="false" onerror="this.style.display='none'">
      `;
    } else {
      el.innerHTML = `
      <div class="food" aria-label="${data.name}">${data.emoji}</div>
      <div class="plate"></div>
      `;
    }

    const item = {
      el,
      x: belt.clientWidth + 155,
      speed: SUSHI_SPEED,
      eaten: false
    };

    const eat = (event) => {
      event.preventDefault();
      if (!running || item.eaten) return;
      if (integrationConfig.embedded && score + data.point > integrationConfig.maxBudget) {
        popup("所持金が足りません", event.clientX, event.clientY, "miss");
        sendIntegrationMessage("budget-blocked", {
          total: score,
          plates: plateCount,
          attemptedPrice: data.point,
        });
        return;
      }
      item.eaten = true;
      score += data.point;
      plateCount += 1;
      eatenPlateColors.push({ color: data.color, accent: data.accent, plateImage: data.plateImage });
      scoreEl.textContent = score.toLocaleString("ja-JP") + "円";
      updatePlateStack();
      sendIntegrationMessage("progress", { total: score, plates: plateCount });
      sayMoguMogu();
      popup("+" + data.point.toLocaleString("ja-JP") + "円", event.clientX, event.clientY, "points");
      el.classList.add("eat");
      setTimeout(() => removeItem(item), 300);
    };

    el.addEventListener("pointerdown", eat, { passive: false });
    belt.appendChild(el);
    items.add(item);
  }


  function updatePlateStack() {
    plateStackEl.innerHTML = "";

    const landscape = window.innerWidth > window.innerHeight;
    const plateHeight = landscape ? (window.innerHeight <= 430 ? 58 : 68) : 56;
    const step = landscape ? (window.innerHeight <= 430 ? 12 : 14) : 14;
    const availableHeight = Math.max(
      120,
      plateStackEl.getBoundingClientRect().height || window.innerHeight * 0.88
    );

    const maxVisible = Math.max(
      1,
      Math.floor((availableHeight - plateHeight) / step) + 1
    );
    const visibleColors = eatenPlateColors.slice(-maxVisible);

    visibleColors.forEach((plateData, index) => {
      if (plateData.plateImage) {
        const plateImg = document.createElement("img");
        plateImg.className = "stacked-plate-image";
        plateImg.src = plateData.plateImage;
        plateImg.alt = "";
        plateImg.draggable = false;
        plateImg.style.bottom = (index * step) + "px";
        plateImg.style.zIndex = String(index + 1);
        plateStackEl.appendChild(plateImg);
      } else {
        const plate = document.createElement("div");
        plate.className = "stacked-plate";
        plate.style.bottom = (index * step) + "px";
        plate.style.setProperty("--stackColor", plateData.color);
        plate.style.setProperty("--stackAccent", plateData.accent);
        plate.style.zIndex = String(index + 1);
        plateStackEl.appendChild(plate);
      }
    });
  }

  function popup(text, clientX, clientY, className) {
    const gameRect = document.getElementById("game").getBoundingClientRect();
    const p = document.createElement("div");
    p.className = className;
    p.textContent = text;
    p.style.left = (clientX - gameRect.left) + "px";
    p.style.top = (clientY - gameRect.top) + "px";
    document.getElementById("game").appendChild(p);
    setTimeout(() => p.remove(), 850);
  }

  function removeItem(item) {
    if (!items.has(item)) return;
    items.delete(item);
    item.el.remove();
  }

  function loop(timestamp) {
    if (!running) return;

    if (!lastTime) lastTime = timestamp;
    const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
    lastTime = timestamp;
    spawnAccumulator += dt;

    if (spawnAccumulator >= 0.18 && canSpawnSushi()) {
      spawnAccumulator = 0;
      spawnSushi();
    }


    for (const item of [...items]) {
      if (item.eaten) continue;
      item.x -= item.speed * dt;
      item.el.style.left = item.x + "px";

      if (item.x < -160) {
        removeItem(item);
      }
    }

    animationId = requestAnimationFrame(loop);
  }

  function startGame() {
    initAudio();
    for (const item of [...items]) removeItem(item);

    score = 0;
    plateCount = 0;
    checkoutSent = false;
    eatenPlateColors = [];
    updatePlateStack();
    running = true;
    startBgm();
    lastTime = 0;
    spawnAccumulator = 0.5;

    scoreEl.textContent = "0円";
    startScreen.style.display = "none";
    checkoutButton.style.display = "block";
    checkoutButton.disabled = false;
    checkoutButton.textContent = "お会計";
    sendIntegrationMessage("ready", {
      total: 0,
      plates: 0,
      maxBudget: integrationConfig.maxBudget,
    });

    cancelAnimationFrame(animationId);
    animationId = requestAnimationFrame(loop);
  }

  function endGame() {
    running = false;
    stopBgm();
    cancelAnimationFrame(animationId);


    checkoutButton.style.display = "none";
  }

  startButton.addEventListener("click", startGame);
  window.addEventListener("load", () => {
    refreshForOrientation();
    startGame();
  });
  document.addEventListener("pointerdown", () => {
    initAudio();

    if (audioContext?.state === "suspended") {
      audioContext.resume().catch(() => {});
    }

    if (running && !bgmMaster) {
      startBgm();
    }
  }, { once: true });


  checkoutButton.addEventListener("click", () => {
    if (checkoutSent) return;
    checkoutSent = true;
    checkoutButton.disabled = true;
    checkoutButton.textContent = "精算中…";
    if (running) endGame();
    sendIntegrationMessage("checkout", { total: score, plates: plateCount });
  });

  window.addEventListener("message", (event) => {
    const message = event.data;
    if (!message || message.source !== "jxj-kaitenzushi-parent" || message.type !== "settings") return;
    integrationConfig.sfxVolume = Math.max(0, Math.min(1, Number(message.sfxVolume) || 0));
    integrationConfig.ambientVolume = Math.max(0, Math.min(1, Number(message.ambientVolume) || 0));
    integrationConfig.sfxMuted = Boolean(message.sfxMuted);
    integrationConfig.ambientMuted = Boolean(message.ambientMuted);
    integrationConfig.externalAudioPriority = Boolean(message.externalAudioPriority);
    if (bgmMaster && audioContext) {
      const now = audioContext.currentTime;
      bgmMaster.gain.cancelScheduledValues(now);
      bgmMaster.gain.linearRampToValueAtTime(0.18 * effectiveAmbientVolume(), now + 0.12);
    }
  });

  window.addEventListener("resize", refreshForOrientation);
  window.addEventListener("orientationchange", () => {
    setTimeout(refreshForOrientation, 180);
  });
  screen.orientation?.addEventListener?.("change", () => {
    setTimeout(refreshForOrientation, 120);
  });

  document.addEventListener("visibilitychange", () => {
    if (document.hidden && running) {
      lastTime = 0;
    }
  });
})();
</script>
</body>
</html>
